name: Regen Docs Index (post-merge staging)

# Régénère les fichiers d'index auto-générés (INDEX-BACK-OFFICE-APP.md,
# INDEX-COMPOSANTS-FORMULAIRES.md, etc.) APRÈS un merge sur staging.
#
# Pourquoi ici (et pas en pre-commit) :
# - Le pre-commit local régénère sur chaque branche en parallèle
#   → versions divergentes entre PRs → conflit garanti au merge
# - Ici : 1 seule source d'exécution (post-merge sur staging) → 0 conflit
# - Source de vérité unique : ce que GitHub Actions calcule depuis staging
#
# Voir incident 2026-04-25 (4 conflits sur INDEX-BACK-OFFICE-APP.md
# dans la même session : PRs #762, #767, #768, #769).

on:
  push:
    branches: [staging]
  workflow_dispatch: # Permet déclenchement manuel pour test

permissions:
  contents: write
  pull-requests: write # Nécessaire pour gh pr create depuis le bot

# Évite que 2 runs concurrents ne se marchent dessus (push staging
# rapproché). On annule l'ancien run pour ne garder que le plus récent.
concurrency:
  group: regen-docs-staging
  cancel-in-progress: true

jobs:
  regen:
    name: Régénération INDEX docs
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout staging
        uses: actions/checkout@v4
        with:
          ref: staging
          # Token avec write contents (par défaut suffisant via permissions ci-dessus)
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Régénérer les INDEX
        # ⚠️ Toujours --all : --auto ne marche QUE sur fichiers staged
        # (vide ici, on est sur un checkout post-merge). Bug fixé 2026-04-25.
        run: |
          python3 scripts/generate-docs.py --all
          echo "Fichiers modifiés par la régénération :"
          git diff --name-only

      - name: Ouvrir une PR si diff (contourne branch protection staging)
        # ⚠️ Limitations connues (2026-04-25) :
        # 1. Push direct sur staging impossible : 4 required checks bloquent.
        #    Solution : créer une branche + PR.
        # 2. PR créée par github-actions[bot] avec GITHUB_TOKEN ne déclenche
        #    PAS les workflows de checks (protection anti-boucle GitHub).
        #    → La PR reste BLOCKED par les required checks indéfiniment.
        # 3. --auto ne marchera pas (cf #2). --admin requiert admin permissions
        #    que le bot n'a pas.
        # SOLUTION DÉFINITIVE : créer un PAT (Personal Access Token) avec
        # contents:write + pull-requests:write, le stocker comme secret
        # WORKFLOW_PAT, et remplacer GITHUB_TOKEN par WORKFLOW_PAT ci-dessous.
        # Sans PAT : Romeo doit merger manuellement chaque PR auto-regen
        # (1 clic, pas bloquant fonctionnellement).
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_PAT || secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ -z "$(git status --porcelain)" ]; then
            echo "✅ Aucun changement — INDEX à jour"
            exit 0
          fi

          BRANCH="chore/regen-index-$(date -u +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "[NO-TASK] chore: regen INDEX docs (post-merge staging)" \
            -m "Auto-régénéré par .github/workflows/regen-docs-index.yml suite au merge précédent. Voir INFRA-CI-001."
          git push origin "$BRANCH"

          gh pr create --base staging --head "$BRANCH" \
            --title "[NO-TASK] chore: regen INDEX docs (auto post-merge)" \
            --body "Régénération automatique des fichiers INDEX après merge sur staging. Voir workflow regen-docs-index.yml."

          # Auto-merge dès que les 4 required checks passent
          gh pr merge "$BRANCH" --squash --auto --delete-branch
          echo "✅ PR auto-merge enabled — sera mergée dès que CI verte"
