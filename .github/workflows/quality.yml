name: Quality Checks

on:
  pull_request:
    branches: [main, staging, integration/*]
  push:
    branches: [main, staging]
  workflow_dispatch:

permissions:
  actions: write
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ----------------------------------------------------------------
  # 1. Detect which apps changed → skip unchanged apps
  # ----------------------------------------------------------------
  detect-changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      back-office: ${{ steps.filter.outputs.back-office }}
      linkme: ${{ steps.filter.outputs.linkme }}
      site-internet: ${{ steps.filter.outputs.site-internet }}
      packages: ${{ steps.filter.outputs.packages }}
      migrations: ${{ steps.filter.outputs.migrations }}
      e2e-needed: ${{ steps.filter.outputs.e2e-needed }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            back-office:
              - 'apps/back-office/**'
              # Déclencher le smoke E2E aussi quand les specs ou la config
              # Playwright changent : sinon une PR qui n'ajoute que des tests
              # passe sans être exécutée (gap observé sur PR #750).
              - 'tests/**'
              - 'playwright.config.ts'
              - 'tests/auth.setup.ts'
            linkme:
              - 'apps/linkme/**'
            site-internet:
              - 'apps/site-internet/**'
            packages:
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tsconfig.json'
              - 'turbo.json'
            migrations:
              - 'supabase/migrations/**'
              - 'packages/@verone/types/src/supabase.ts'
              - 'packages/@verone/types/src/database.ts'
            # e2e-needed = patterns qui justifient un E2E Playwright.
            # Restreint aux fichiers UI / flows critiques afin d'épargner
            # ~10 min de CI sur les PRs purement backend (api/**, integrations,
            # utils, types Supabase régénérés, migrations DB, docs). Voir
            # INFRA-CI-001.
            e2e-needed:
              - 'apps/back-office/src/app/(protected)/**'
              - 'apps/back-office/src/app/(public)/**'
              - 'apps/back-office/src/components/**'
              - 'apps/back-office/middleware.ts'
              - 'apps/back-office/next.config.*'
              - 'apps/back-office/package.json'
              - 'tests/e2e/**'
              - 'tests/auth.setup.ts'
              - 'playwright.config.ts'
              - 'packages/@verone/ui/**'
              - 'packages/@verone/forms/**'
              - 'packages/@verone/finance/**'
              - 'packages/@verone/orders/**'
              - 'packages/@verone/hooks/**'
              - 'pnpm-lock.yaml'

  # ----------------------------------------------------------------
  # 2. Quality checks — only on affected apps
  # ----------------------------------------------------------------
  quality:
    name: ESLint + Type-Check + Build
    needs: detect-changes
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.13.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ---- Next.js build cache (official pattern from nextjs.org/docs) ----
      - name: Cache Next.js builds
        uses: actions/cache@v5
        with:
          path: |
            apps/back-office/.next/cache
            apps/linkme/.next/cache
            apps/site-internet/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-
            ${{ runner.os }}-nextjs-

      # ---- Determine which --filter flags to use ----
      - name: Build filter flags
        id: flags
        run: |
          FILTERS=""
          APPS_CHANGED=""

          # If shared packages changed → check ALL apps
          if [ "${{ needs.detect-changes.outputs.packages }}" = "true" ]; then
            FILTERS="--filter=@verone/back-office --filter=@verone/linkme --filter=@verone/site-internet"
            APPS_CHANGED="back-office, linkme, site-internet (packages changed)"
          else
            if [ "${{ needs.detect-changes.outputs.back-office }}" = "true" ]; then
              FILTERS="$FILTERS --filter=@verone/back-office"
              APPS_CHANGED="$APPS_CHANGED back-office"
            fi
            if [ "${{ needs.detect-changes.outputs.linkme }}" = "true" ]; then
              FILTERS="$FILTERS --filter=@verone/linkme"
              APPS_CHANGED="$APPS_CHANGED linkme"
            fi
            if [ "${{ needs.detect-changes.outputs.site-internet }}" = "true" ]; then
              FILTERS="$FILTERS --filter=@verone/site-internet"
              APPS_CHANGED="$APPS_CHANGED site-internet"
            fi
          fi

          # Fallback: if nothing detected, check all
          if [ -z "$FILTERS" ]; then
            FILTERS="--filter=@verone/back-office --filter=@verone/linkme --filter=@verone/site-internet"
            APPS_CHANGED="all (fallback)"
          fi

          echo "filters=$FILTERS" >> $GITHUB_OUTPUT
          echo "apps=$APPS_CHANGED" >> $GITHUB_OUTPUT
          echo "📦 Apps to check: $APPS_CHANGED"

      # ---- ESLint (fast, always global) ----
      - name: ESLint
        run: pnpm lint

      # ---- Type-Check (filtered) ----
      - name: Type-Check (${{ steps.flags.outputs.apps }})
        run: pnpm turbo run type-check ${{ steps.flags.outputs.filters }}
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      # ---- Build (filtered) ----
      - name: Build (${{ steps.flags.outputs.apps }})
        run: pnpm turbo run build ${{ steps.flags.outputs.filters }}
        env:
          NODE_OPTIONS: --max-old-space-size=8192
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      # ---- PR comment on failure ----
      - name: Comment PR on Failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ❌ Quality Checks Failed\n\nApps checked: **${{ steps.flags.outputs.apps }}**\n\nSee [workflow logs](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.\n\n**Fix locally:**\n\`\`\`bash\npnpm lint\npnpm turbo run type-check ${{ steps.flags.outputs.filters }}\npnpm turbo run build ${{ steps.flags.outputs.filters }}\n\`\`\``
            });

      - name: Summary
        if: success()
        run: |
          echo "## ✅ Quality Checks Passed" >> $GITHUB_STEP_SUMMARY
          echo "Apps checked: **${{ steps.flags.outputs.apps }}**" >> $GITHUB_STEP_SUMMARY

  # ----------------------------------------------------------------
  # 3a. E2E Niveau 1 — smoke-golden
  #     Gate PR : 1 spec, ~30 sec. Valide le golden path minimal.
  #     Lancé sur toute PR UI (e2e-needed == true).
  #     Continue-on-error : informationnel (non-bloquant au merge).
  # ----------------------------------------------------------------
  smoke-golden:
    name: E2E smoke-golden (Niveau 1 — ~30 sec)
    needs: [detect-changes, quality]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    if: needs.detect-changes.outputs.e2e-needed == 'true' && github.event_name == 'pull_request'
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      E2E_USER_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
      E2E_USER_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.13.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright browsers (chromium only — cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: Cache Next.js build
        uses: actions/cache@v5
        with:
          path: apps/back-office/.next/cache
          key: ${{ runner.os }}-nextjs-bo-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('apps/back-office/**/*.ts', 'apps/back-office/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-bo-${{ hashFiles('pnpm-lock.yaml') }}-
            ${{ runner.os }}-nextjs-bo-

      - name: Build back-office
        run: pnpm --filter @verone/back-office build
        env:
          NODE_OPTIONS: --max-old-space-size=8192

      - name: Start back-office (background)
        run: |
          pnpm --filter @verone/back-office start > /tmp/next-start.log 2>&1 &
          echo $! > /tmp/next-start.pid
          for i in {1..60}; do
            if curl -sf http://localhost:3000/login > /dev/null; then
              echo "Back-office up on :3000"
              break
            fi
            sleep 1
          done

      - name: Run smoke golden (1 spec, ~30 sec)
        run: pnpm exec playwright test tests/e2e/smoke/smoke-golden.spec.ts --reporter=list
        env:
          BASE_URL: http://localhost:3000

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-smoke-golden
          path: |
            tests/reports/
            test-results/
          retention-days: 7

      - name: Comment PR on smoke failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ❌ E2E Smoke Golden Échoué (Niveau 1)\n\nLe parcours utilisateur de base est cassé : dashboard → commandes → LinkMe.\n\nSpec : \`tests/e2e/smoke/smoke-golden.spec.ts\`\n\nVoir le [log du job smoke-golden](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) pour le détail.`
            });

  # ----------------------------------------------------------------
  # 3b. E2E Niveau 2 — smoke-domaine (sharded 4 runners)
  #     Lance les 9 specs smoke domaine en parallèle.
  #     Sur PR UI + push main. ~2 min wall-clock.
  #     Dépend de smoke-golden (si golden fail → domaine skip).
  # ----------------------------------------------------------------
  smoke-domaine:
    name: E2E smoke-domaine shard ${{ matrix.shard }}/4 (Niveau 2)
    needs: [detect-changes, smoke-golden]
    runs-on: ubuntu-latest
    timeout-minutes: 8
    continue-on-error: true
    if: >
      needs.detect-changes.outputs.e2e-needed == 'true' &&
      (github.event_name == 'pull_request' || github.ref == 'refs/heads/main')
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      E2E_USER_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
      E2E_USER_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.13.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright browsers (chromium only — cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: Cache Next.js build
        uses: actions/cache@v5
        with:
          path: apps/back-office/.next/cache
          key: ${{ runner.os }}-nextjs-bo-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('apps/back-office/**/*.ts', 'apps/back-office/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-bo-${{ hashFiles('pnpm-lock.yaml') }}-
            ${{ runner.os }}-nextjs-bo-

      - name: Build back-office
        run: pnpm --filter @verone/back-office build
        env:
          NODE_OPTIONS: --max-old-space-size=8192

      - name: Start back-office (background)
        run: |
          pnpm --filter @verone/back-office start > /tmp/next-start.log 2>&1 &
          echo $! > /tmp/next-start.pid
          for i in {1..60}; do
            if curl -sf http://localhost:3000/login > /dev/null; then
              echo "Back-office up on :3000"
              break
            fi
            sleep 1
          done

      - name: Run smoke domaine (shard ${{ matrix.shard }}/4)
        run: |
          pnpm exec playwright test \
            --shard=${{ matrix.shard }}/4 \
            tests/e2e/smoke/smoke-finance.spec.ts \
            tests/e2e/smoke/smoke-finance-modals.spec.ts \
            tests/e2e/smoke/smoke-commandes.spec.ts \
            tests/e2e/smoke/smoke-stock.spec.ts \
            tests/e2e/smoke/smoke-canaux.spec.ts \
            tests/e2e/smoke/smoke-produits.spec.ts \
            tests/e2e/smoke/smoke-contacts.spec.ts \
            tests/e2e/smoke/smoke-linkme.spec.ts \
            tests/e2e/smoke/smoke-ambassador.spec.ts \
            --reporter=list
        env:
          BASE_URL: http://localhost:3000

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-smoke-domaine-shard-${{ matrix.shard }}
          path: |
            tests/reports/
            test-results/
          retention-days: 7

      - name: Comment PR on smoke failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ❌ E2E Smoke Domaine Échoué (Niveau 2 — shard ${{ matrix.shard }}/4)\n\nUne régression a été détectée dans le shard ${{ matrix.shard }}/4 des tests domaine.\n\nVoir le [log du job smoke-domaine](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) et le Playwright report en artifact \`playwright-report-smoke-domaine-shard-${{ matrix.shard }}\`.`
            });

  # ----------------------------------------------------------------
  # 3c. E2E Niveau 3 — e2e-full (sharded 4 runners)
  #     Workflows métier complets. Sur push main OU workflow_dispatch.
  #     ~5 min wall-clock.
  # ----------------------------------------------------------------
  e2e-full:
    name: E2E full shard ${{ matrix.shard }}/4 (Niveau 3)
    needs: [detect-changes]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      E2E_USER_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
      E2E_USER_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.13.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright browsers (chromium only — cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: Cache Next.js build
        uses: actions/cache@v5
        with:
          path: apps/back-office/.next/cache
          key: ${{ runner.os }}-nextjs-bo-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('apps/back-office/**/*.ts', 'apps/back-office/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-bo-${{ hashFiles('pnpm-lock.yaml') }}-
            ${{ runner.os }}-nextjs-bo-

      - name: Build back-office
        run: pnpm --filter @verone/back-office build
        env:
          NODE_OPTIONS: --max-old-space-size=8192

      - name: Start back-office (background)
        run: |
          pnpm --filter @verone/back-office start > /tmp/next-start.log 2>&1 &
          echo $! > /tmp/next-start.pid
          for i in {1..60}; do
            if curl -sf http://localhost:3000/login > /dev/null; then
              echo "Back-office up on :3000"
              break
            fi
            sleep 1
          done

      - name: Run e2e full (shard ${{ matrix.shard }}/4)
        run: |
          pnpm exec playwright test \
            --shard=${{ matrix.shard }}/4 \
            tests/e2e/workflows/ \
            tests/e2e/stocks/ \
            tests/e2e/smoke/smoke-147-pages.spec.ts \
            tests/e2e/smoke/smoke-critical-workflows.spec.ts \
            tests/e2e/linkme-org-independante-workflow.spec.ts \
            tests/e2e/linkme-public-selection.spec.ts \
            tests/e2e/si-pricing-minimum-guard.spec.ts \
            --reporter=list
        env:
          BASE_URL: http://localhost:3000

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-e2e-full-shard-${{ matrix.shard }}
          path: |
            tests/reports/
            test-results/
          retention-days: 7

  # ----------------------------------------------------------------
  # 4. DB FK drift check — gate bloquant (ADR-018)
  #    Détecte toute modification DB faite hors migration (SQL Editor
  #    Supabase, script manuel, etc.). Le backlog a été nettoyé par la
  #    migration 20260424_001_retrofit_legacy_fk_declarations.sql
  #    (INFRA-HARDENING-002), drift = 0 au moment du merge.
  #    Tout nouveau drift fait échouer la PR → oblige à versionner.
  # ----------------------------------------------------------------
  db-drift-check:
    name: DB FK drift check (blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install psycopg2
        run: pip install psycopg2-binary

      - name: Run db-drift-check
        if: env.SUPABASE_DB_URL != ''
        run: python3 scripts/db-drift-check.py --ci

      - name: Upload drift report
        if: always() && env.SUPABASE_DB_URL != ''
        uses: actions/upload-artifact@v4
        with:
          name: drift-report
          path: drift-report.json
          retention-days: 30

      - name: Comment PR on drift failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ❌ DB FK Drift Detected\n\nUne FK a été ajoutée, supprimée ou modifiée sur la DB **sans migration versionnée**.\n\nVoir le [drift report](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) téléchargé en artifact.\n\n**Corriger :**\n1. Créer une migration \`supabase/migrations/YYYYMMDD_XXX_description.sql\` qui déclare le changement.\n2. Si le changement en live est intentionnel : ajouter \`DROP CONSTRAINT IF EXISTS ... ADD CONSTRAINT ... ON DELETE <rule>\`.\n3. Ne **pas** modifier une migration existante (règle append-only).\n\nRéférence : ADR-018 dans \`.claude/DECISIONS.md\`.`
            });

      - name: Skip note
        if: env.SUPABASE_DB_URL == ''
        run: |
          echo "⚠️ SUPABASE_DB_URL secret not set — drift check skipped." >> $GITHUB_STEP_SUMMARY
          echo "Configure secret in repo settings to enable." >> $GITHUB_STEP_SUMMARY

  # ----------------------------------------------------------------
  # 5. Supabase TypeScript types drift — gate bloquant
  #    Toute migration SQL change le schéma DB. Les types TS dans
  #    packages/@verone/types/src/supabase.ts doivent refléter ce schéma.
  #    Si un dev ajoute une migration sans régénérer les types, le code TS
  #    ignore la nouvelle colonne/FK silencieusement → régression runtime.
  #
  #    Ce job régénère les types côté CI via `supabase gen types typescript
  #    --db-url $SUPABASE_DB_URL` (méthode officielle Supabase) et compare
  #    au fichier commité. Drift non-nul → PR refusée.
  #
  #    Le job tourne TOUJOURS (sinon GitHub reporte "skipped" sur les PRs
  #    sans migration, ce qui ne satisfait pas le required status check
  #    en branch protection → toutes les PRs sans migration restent bloquées).
  #    Quand aucune migration n'est touchée, le job exécute un no-op qui
  #    rapporte "success" via le step-summary. Voir INFRA-CI-002.
  #    Nécessite le secret `SUPABASE_DB_URL` (déjà utilisé par db-drift-check).
  # ----------------------------------------------------------------
  supabase-types-drift:
    name: Supabase TS types drift (blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: detect-changes
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      MIGRATIONS_TOUCHED: ${{ needs.detect-changes.outputs.migrations }}

    steps:
      # No-op success quand aucune migration ni fichier supabase.ts n'est touché.
      # Garantit que le check est reporté comme "success" (pas "skipped") afin
      # de satisfaire la branch protection sur les PRs sans changement DB.
      - name: No-op (no DB migration in this PR)
        if: env.MIGRATIONS_TOUCHED != 'true'
        run: |
          echo "## ✅ Pas de migration DB dans cette PR" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Aucun fichier sous \`supabase/migrations/**\` ni \`packages/@verone/types/src/supabase.ts\` n'a été modifié." >> $GITHUB_STEP_SUMMARY
          echo "Le check de drift de types est inutile pour cette PR — pas de régénération nécessaire." >> $GITHUB_STEP_SUMMARY

      - name: Checkout code
        if: env.MIGRATIONS_TOUCHED == 'true'
        uses: actions/checkout@v4

      - name: Setup pnpm
        if: env.MIGRATIONS_TOUCHED == 'true' && env.SUPABASE_DB_URL != ''
        uses: pnpm/action-setup@v2
        with:
          version: 10.13.1

      - name: Setup Node.js
        if: env.MIGRATIONS_TOUCHED == 'true' && env.SUPABASE_DB_URL != ''
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies (needed for @verone/prettier-config)
        if: env.MIGRATIONS_TOUCHED == 'true' && env.SUPABASE_DB_URL != ''
        run: pnpm install --frozen-lockfile

      - name: Install Supabase CLI
        if: env.MIGRATIONS_TOUCHED == 'true' && env.SUPABASE_DB_URL != ''
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Regenerate types from live DB
        if: env.MIGRATIONS_TOUCHED == 'true' && env.SUPABASE_DB_URL != ''
        run: |
          supabase gen types typescript --db-url "$SUPABASE_DB_URL" \
            > packages/@verone/types/src/supabase.ts.generated
          # Format via prettier pour aligner sur la convention du repo
          # (semi: true, etc.). Sans ça le diff matche sur chaque ;/,
          # → faux positif 30000 lignes.
          pnpm exec prettier --write packages/@verone/types/src/supabase.ts.generated --parser typescript
          # Comparer au fichier commité (--ignore-all-space pour neutraliser
          # les diff de whitespace entre versions de la CLI).
          diff -w packages/@verone/types/src/supabase.ts \
            packages/@verone/types/src/supabase.ts.generated \
            > types-drift.diff || true
          if [ -s types-drift.diff ]; then
            echo "❌ Les types Supabase sont désynchronisés du schéma DB."
            echo "Corriger localement : pnpm run generate:types"
            echo ""
            echo "=== Diff (200 premières lignes) ==="
            head -200 types-drift.diff
            exit 1
          fi

      - name: Upload drift diff on failure
        if: failure() && env.MIGRATIONS_TOUCHED == 'true' && env.SUPABASE_DB_URL != ''
        uses: actions/upload-artifact@v4
        with:
          name: supabase-types-drift
          path: |
            types-drift.diff
            packages/@verone/types/src/supabase.ts.generated
          retention-days: 7

      - name: Comment PR on types drift
        if: failure() && env.MIGRATIONS_TOUCHED == 'true' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ❌ Supabase Types Drift\n\nLe fichier \`packages/@verone/types/src/supabase.ts\` n'est pas à jour avec le schéma DB actuel.\n\n**Corriger :**\n\`\`\`bash\npnpm run generate:types\ngit add packages/@verone/types/src/supabase.ts\ngit commit -m "chore: regenerate supabase types"\ngit push\n\`\`\`\n\nVoir le diff en artifact du workflow.`
            });

      - name: Skip note (secret missing)
        if: env.MIGRATIONS_TOUCHED == 'true' && env.SUPABASE_DB_URL == ''
        run: |
          echo "⚠️ SUPABASE_DB_URL secret not set — types drift skipped." >> $GITHUB_STEP_SUMMARY

  # ----------------------------------------------------------------
  # 6. Supabase security advisors — informationnel (non-bloquant)
  #    Appelle le Supabase Management API pour lister les lints
  #    (security_definer_view, rls_policy_always_true, function_search_path_mutable,
  #    etc.). Ne bloque pas la PR mais commente avec un delta si le
  #    nombre total d'issues augmente vs la dernière mesure sur `main`.
  #
  #    Source : https://supabase.com/docs/guides/database/database-advisors
  #    API : GET /v1/projects/{ref}/advisors/lints?type=security
  #
  #    Nécessite les secrets :
  #      - SUPABASE_ACCESS_TOKEN (Personal Access Token Supabase)
  #      - SUPABASE_PROJECT_REF (ex. `aorroydfjsrygmosnzrl`)
  # ----------------------------------------------------------------
  supabase-advisors-security:
    name: Supabase security advisors (informational)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    if: github.event_name == 'pull_request'
    continue-on-error: true
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch security advisors
        if: env.SUPABASE_ACCESS_TOKEN != '' && env.SUPABASE_PROJECT_REF != ''
        run: python3 scripts/supabase-advisors-check.py --type security --baseline scripts/supabase-advisors-baseline.json

      - name: Comment PR with summary
        if: always() && env.SUPABASE_ACCESS_TOKEN != '' && env.SUPABASE_PROJECT_REF != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            let summary = '';
            try {
              summary = fs.readFileSync('advisors-summary.md', 'utf8');
            } catch (e) {
              summary = '(advisors summary non disponible)';
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary,
            });

      - name: Skip note
        if: env.SUPABASE_ACCESS_TOKEN == '' || env.SUPABASE_PROJECT_REF == ''
        run: |
          echo "⚠️ Secrets SUPABASE_ACCESS_TOKEN / SUPABASE_PROJECT_REF absents." >> $GITHUB_STEP_SUMMARY
          echo "Configure-les dans repo settings → Secrets → Actions." >> $GITHUB_STEP_SUMMARY
          echo "Token : https://supabase.com/dashboard/account/tokens" >> $GITHUB_STEP_SUMMARY
