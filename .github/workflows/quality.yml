name: Quality Checks

on:
  pull_request:
    branches: [main, staging, integration/*]
  push:
    branches: [main, staging]

permissions:
  actions: write
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint + Type-Check + Build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.13.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ---- Next.js build cache (official pattern from nextjs.org/docs) ----
      - name: Cache Next.js builds
        uses: actions/cache@v4
        with:
          path: |
            apps/back-office/.next/cache
            apps/linkme/.next/cache
            apps/site-internet/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-
            ${{ runner.os }}-nextjs-

      # ---- Quality checks ----
      - name: Run quality checks
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "Push event — running all packages"
            pnpm turbo run lint type-check build
          else
            echo "PR event — running affected packages only"
            pnpm turbo run lint type-check build --affected
          fi
        env:
          NODE_OPTIONS: --max-old-space-size=8192
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      # ---- PR comment on failure ----
      - name: Comment PR on Failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Quality Checks Failed\n\nSee [workflow logs](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.\n\n**Fix locally:**\n\`\`\`bash\npnpm turbo run lint type-check build\n\`\`\``
            });

      - name: Summary
        if: success()
        run: |
          echo "## Quality Checks Passed" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "Mode: **full** (push to ${{ github.ref_name }})" >> $GITHUB_STEP_SUMMARY
          else
            echo "Mode: **affected only** (pull request)" >> $GITHUB_STEP_SUMMARY
          fi
