name: Quality Checks

on:
  pull_request:
    branches: [main, staging, integration/*]
  push:
    branches: [main, staging]

permissions:
  actions: write
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ----------------------------------------------------------------
# Shared setup: pnpm + Node.js + Turborepo cache
# Uses --affected flag (official Turborepo pattern) instead of
# manual dorny/paths-filter detection. Turbo compares git HEAD
# against the base branch to determine which packages changed.
# ----------------------------------------------------------------

jobs:
  # ----------------------------------------------------------------
  # 1. ESLint (parallel — runs independently)
  # ----------------------------------------------------------------
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.13.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-lint-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-lint-

      - name: ESLint (affected packages only)
        run: pnpm turbo run lint --affected

  # ----------------------------------------------------------------
  # 2. Type-Check (parallel — runs independently)
  # ----------------------------------------------------------------
  type-check:
    name: Type-Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.13.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-typecheck-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-typecheck-

      - name: Type-Check (affected packages only)
        run: pnpm turbo run type-check --affected
        env:
          NODE_OPTIONS: --max-old-space-size=4096

  # ----------------------------------------------------------------
  # 3. Build (waits for lint + type-check)
  # ----------------------------------------------------------------
  build:
    name: Build
    needs: [lint, type-check]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.13.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-build-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-build-

      - name: Build (affected packages only)
        run: pnpm turbo run build --affected
        env:
          NODE_OPTIONS: --max-old-space-size=8192
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Summary
        if: success()
        run: |
          echo "## ✅ Quality Checks Passed" >> $GITHUB_STEP_SUMMARY
          echo "All affected packages passed lint, type-check, and build." >> $GITHUB_STEP_SUMMARY

      - name: Comment PR on Failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ❌ Build Failed\n\nSee [workflow logs](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.\n\n**Fix locally:**\n\`\`\`bash\npnpm turbo run lint type-check build --affected\n\`\`\``
            });
