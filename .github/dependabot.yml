# Dependabot configuration
# Source officielle : https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Stratégie :
#   - npm : update hebdomadaire (lundi matin), groupé par type (patch/minor/major).
#     Ouvre 1 PR max à la fois pour ne pas spammer.
#     Les majors sont flaggés séparément — à reviewer avec attention.
#   - github-actions : update mensuel (moins critique).
#
# Pour activer l'auto-merge sur les bumps patch/minor (reco Romeo) :
#   - Créer un workflow `.github/workflows/dependabot-auto-merge.yml` qui
#     appelle `gh pr merge --auto --squash` si update-type != major.
#   - À ajouter dans un sprint ultérieur si bruit acceptable.

version: 2
updates:
  # ------------------------------------------------------------------
  # npm / pnpm (monorepo racine — pnpm-lock.yaml unique)
  # ------------------------------------------------------------------
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:00'
      timezone: 'Europe/Paris'
    open-pull-requests-limit: 3
    labels:
      - 'dependencies'
      - 'infra'
    commit-message:
      prefix: '[DEPS]'
      include: 'scope'
    groups:
      # Regrouper tous les patch/minor en une seule PR par semaine
      minor-and-patch:
        update-types:
          - 'minor'
          - 'patch'
      # Les majors restent en PRs séparées (review manuelle)
      major-react:
        patterns:
          - 'react'
          - 'react-dom'
          - 'next'
        update-types:
          - 'major'
      major-typescript:
        patterns:
          - 'typescript'
          - '@typescript-eslint/*'
        update-types:
          - 'major'
      major-supabase:
        patterns:
          - '@supabase/*'
          - 'supabase'
        update-types:
          - 'major'
    ignore:
      # Évite les bumps agressifs qui ne servent à rien
      - dependency-name: '*'
        update-types:
          - 'version-update:semver-major'
        # commenté par défaut — retirer l'ignore après stabilisation

  # ------------------------------------------------------------------
  # GitHub Actions (workflows CI)
  # ------------------------------------------------------------------
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
      day: 'monday'
    open-pull-requests-limit: 2
    labels:
      - 'dependencies'
      - 'ci'
    commit-message:
      prefix: '[CI-DEPS]'
