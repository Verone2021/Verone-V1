<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 420px;
      max-height: 580px;
      overflow-y: auto;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #fafafa;
    }
    .header {
      background: #000;
      color: #fff;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header h1 { font-size: 14px; font-weight: 600; }
    .header .badge {
      font-size: 10px;
      background: #22c55e;
      padding: 2px 6px;
      border-radius: 9999px;
    }
    .content { padding: 12px; }
    .status {
      padding: 10px 12px;
      border-radius: 8px;
      margin-bottom: 10px;
      font-size: 12px;
    }
    .status.detecting { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
    .status.ready { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
    .status.error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
    .status.success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
    .status.unsupported { background: #fefce8; color: #854d0e; border: 1px solid #fef08a; }

    /* Editable field rows */
    .field-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 8px;
      padding: 8px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
    }
    .field-row.disabled { opacity: 0.4; }
    .field-row input[type="checkbox"] {
      margin-top: 4px;
      accent-color: #000;
      cursor: pointer;
    }
    .field-info { flex: 1; min-width: 0; }
    .field-label {
      font-size: 10px;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 2px;
    }
    .field-value {
      width: 100%;
      font-size: 12px;
      border: 1px solid transparent;
      border-radius: 4px;
      padding: 3px 6px;
      background: #f9fafb;
      color: #111;
      transition: border-color 0.15s;
    }
    .field-value:hover { border-color: #d1d5db; }
    .field-value:focus { border-color: #000; outline: none; background: #fff; }
    textarea.field-value { resize: vertical; min-height: 40px; }
    .field-value:disabled { background: #f3f4f6; color: #9ca3af; }

    /* Images preview */
    .images-row { margin-bottom: 8px; }
    .images-row .field-label { margin-bottom: 6px; padding-left: 24px; }
    .images-grid {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      padding-left: 24px;
    }
    .img-thumb {
      position: relative;
      width: 52px;
      height: 52px;
    }
    .img-thumb img {
      width: 52px;
      height: 52px;
      object-fit: cover;
      border-radius: 4px;
      border: 1px solid #e5e7eb;
    }
    .img-thumb input[type="checkbox"] {
      position: absolute;
      top: 2px;
      left: 2px;
      accent-color: #000;
    }
    .img-thumb.unchecked img { opacity: 0.3; }

    /* Supplier section */
    .section-title {
      font-size: 11px;
      font-weight: 700;
      color: #374151;
      padding: 8px 0 4px;
      border-bottom: 1px solid #e5e7eb;
      margin-bottom: 8px;
    }

    /* Badges */
    .badges { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 8px; padding-left: 24px; }
    .badge-tag {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      background: #f3f4f6;
      color: #374151;
    }
    .badge-tag.green { background: #dcfce7; color: #166534; }
    .badge-tag.blue { background: #dbeafe; color: #1d4ed8; }

    /* Page type */
    .page-type {
      font-size: 11px;
      font-weight: 500;
      padding: 6px 10px;
      border-radius: 6px;
      margin-bottom: 10px;
    }

    /* Actions */
    .actions {
      display: flex;
      gap: 8px;
      padding: 12px;
      background: #fff;
      border-top: 1px solid #e5e7eb;
      position: sticky;
      bottom: 0;
    }
    .btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn.primary { background: #000; color: #fff; }
    .btn.primary:hover:not(:disabled) { background: #333; }
    .btn.secondary { background: #f3f4f6; color: #374151; }
    .btn.secondary:hover:not(:disabled) { background: #e5e7eb; }

    .link { color: #2563eb; text-decoration: none; font-size: 12px; }
    .link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Verone Sourcing</h1>
    <span class="badge">Import</span>
  </div>

  <div class="content">
    <div id="status" class="status detecting">Analyse de la page en cours...</div>
    <div id="page-type" class="page-type" style="display:none"></div>

    <!-- Champs editables du produit -->
    <div id="fields-container"></div>

    <!-- Images -->
    <div id="images-container" class="images-row" style="display:none">
      <div class="field-label">Photos</div>
      <div class="images-grid" id="images-grid"></div>
    </div>

    <!-- Fournisseur -->
    <div id="supplier-section" style="display:none">
      <div class="section-title">Fournisseur</div>
      <div id="supplier-fields"></div>
      <div id="supplier-badges" class="badges"></div>
    </div>
  </div>

  <!-- Actions sticky en bas -->
  <div class="actions" id="actions-bar" style="display:none">
    <button class="btn secondary" id="btn-refresh">Reanalyser</button>
    <button class="btn primary" id="btn-import" disabled>Importer</button>
  </div>

  <!-- Success -->
  <div id="success-link" style="display:none; padding:12px; text-align:center;">
    <a class="link" id="result-link" href="#" target="_blank">Ouvrir la fiche</a>
  </div>

  <input type="hidden" id="backoffice-url" value="http://localhost:3000" />

  <script src="popup.js"></script>
</body>
</html>
