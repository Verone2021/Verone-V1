<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 420px;
      max-height: 580px;
      overflow-y: auto;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #fafafa;
    }
    .header {
      background: #000;
      color: #fff;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header h1 { font-size: 14px; font-weight: 600; }
    .header .badge {
      font-size: 10px;
      background: #22c55e;
      padding: 2px 6px;
      border-radius: 9999px;
    }
    .content { padding: 12px; }
    .status {
      padding: 10px 12px;
      border-radius: 8px;
      margin-bottom: 10px;
      font-size: 12px;
    }
    .status.detecting { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
    .status.ready { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
    .status.error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
    .status.success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
    .status.unsupported { background: #fefce8; color: #854d0e; border: 1px solid #fef08a; }

    /* Editable field rows */
    .field-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 8px;
      padding: 8px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
    }
    .field-row.disabled { opacity: 0.4; }
    .field-row input[type="checkbox"] {
      margin-top: 4px;
      accent-color: #000;
      cursor: pointer;
    }
    .field-info { flex: 1; min-width: 0; }
    .field-label {
      font-size: 10px;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 2px;
    }
    .field-value {
      width: 100%;
      font-size: 12px;
      border: 1px solid transparent;
      border-radius: 4px;
      padding: 3px 6px;
      background: #f9fafb;
      color: #111;
      transition: border-color 0.15s;
    }
    .field-value:hover { border-color: #d1d5db; }
    .field-value:focus { border-color: #000; outline: none; background: #fff; }
    textarea.field-value { resize: vertical; min-height: 40px; }
    .field-value:disabled { background: #f3f4f6; color: #9ca3af; }

    /* Brand chips multi-select */
    .brands-row {
      margin-bottom: 8px;
      padding: 8px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
    }
    .brands-row .field-label { padding-left: 0; margin-bottom: 6px; }
    .brand-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .brand-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      border: 1px solid #e5e7eb;
      border-radius: 9999px;
      font-size: 11px;
      cursor: pointer;
      background: #fff;
      color: #374151;
      transition: all 0.15s;
      user-select: none;
    }
    .brand-chip:hover { border-color: #9ca3af; }
    .brand-chip.selected {
      background: #1d1d1b;
      color: #fff;
      border-color: #1d1d1b;
    }
    .brand-chip .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.5;
    }
    .brand-chip.selected .dot { opacity: 1; }

    /* Error details box */
    .error-details {
      margin-top: 8px;
      padding: 8px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 6px;
      font-size: 11px;
      color: #991b1b;
      font-family: ui-monospace, SFMono-Regular, monospace;
      max-height: 120px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* Login form */
    .login-card {
      padding: 16px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      margin: 12px;
    }
    .login-card h2 {
      font-size: 14px;
      font-weight: 600;
      color: #111;
      margin-bottom: 4px;
    }
    .login-card p {
      font-size: 11px;
      color: #6b7280;
      margin-bottom: 12px;
    }
    .login-card input {
      width: 100%;
      padding: 8px 10px;
      font-size: 13px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      margin-bottom: 8px;
      background: #fff;
    }
    .login-card input:focus { border-color: #000; outline: none; }
    .login-card button {
      width: 100%;
      padding: 9px;
      font-size: 13px;
      font-weight: 500;
      border: none;
      border-radius: 6px;
      background: #000;
      color: #fff;
      cursor: pointer;
    }
    .login-card button:disabled { opacity: 0.5; cursor: not-allowed; }
    .login-error {
      font-size: 11px;
      color: #991b1b;
      margin-top: 6px;
    }

    /* Success modal overlay */
    .success-modal {
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.96);
      padding: 16px;
      overflow-y: auto;
      z-index: 100;
      display: flex;
      flex-direction: column;
    }
    .success-modal .icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #dcfce7;
      color: #166534;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      margin: 0 auto 10px;
    }
    .success-modal h2 {
      text-align: center;
      font-size: 15px;
      font-weight: 700;
      color: #111;
      margin-bottom: 4px;
    }
    .success-modal .subtitle {
      text-align: center;
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 12px;
    }
    .success-modal .summary {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 10px;
      font-size: 12px;
    }
    .success-modal .summary .row {
      display: grid;
      grid-template-columns: 90px 1fr;
      gap: 4px 8px;
      margin-bottom: 4px;
    }
    .success-modal .summary .row .k {
      color: #6b7280;
      font-size: 11px;
    }
    .success-modal .summary .row .v {
      color: #111;
      font-weight: 500;
      word-break: break-word;
    }
    .success-modal .summary h3 {
      font-size: 12px;
      font-weight: 700;
      color: #111;
      margin-bottom: 6px;
      padding-bottom: 4px;
      border-bottom: 1px solid #e5e7eb;
    }
    .success-modal .actions-bottom {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: auto;
    }
    .success-modal .actions-bottom .btn {
      padding: 9px;
      font-size: 13px;
      font-weight: 500;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    .success-modal .btn.primary { background: #000; color: #fff; }
    .success-modal .btn.secondary {
      background: #fff;
      color: #111;
      border: 1px solid #d1d5db;
    }

    /* Images preview */
    .images-row { margin-bottom: 8px; }
    .images-row .field-label { margin-bottom: 6px; padding-left: 24px; }
    .images-grid {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      padding-left: 24px;
    }
    .img-thumb {
      position: relative;
      width: 52px;
      height: 52px;
    }
    .img-thumb img {
      width: 52px;
      height: 52px;
      object-fit: cover;
      border-radius: 4px;
      border: 1px solid #e5e7eb;
    }
    .img-thumb input[type="checkbox"] {
      position: absolute;
      top: 2px;
      left: 2px;
      accent-color: #000;
    }
    .img-thumb.unchecked img { opacity: 0.3; }

    /* Supplier section */
    .section-title {
      font-size: 11px;
      font-weight: 700;
      color: #374151;
      padding: 8px 0 4px;
      border-bottom: 1px solid #e5e7eb;
      margin-bottom: 8px;
    }

    /* Badges */
    .badges { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 8px; padding-left: 24px; }
    .badge-tag {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      background: #f3f4f6;
      color: #374151;
    }
    .badge-tag.green { background: #dcfce7; color: #166534; }
    .badge-tag.blue { background: #dbeafe; color: #1d4ed8; }

    /* Page type */
    .page-type {
      font-size: 11px;
      font-weight: 500;
      padding: 6px 10px;
      border-radius: 6px;
      margin-bottom: 10px;
    }

    /* Actions */
    .actions {
      display: flex;
      gap: 8px;
      padding: 12px;
      background: #fff;
      border-top: 1px solid #e5e7eb;
      position: sticky;
      bottom: 0;
    }
    .btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn.primary { background: #000; color: #fff; }
    .btn.primary:hover:not(:disabled) { background: #333; }
    .btn.secondary { background: #f3f4f6; color: #374151; }
    .btn.secondary:hover:not(:disabled) { background: #e5e7eb; }

    .link { color: #2563eb; text-decoration: none; font-size: 12px; }
    .link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Verone Sourcing</h1>
    <span class="badge">Import</span>
  </div>

  <div class="content">
    <div id="status" class="status detecting">Analyse de la page en cours...</div>
    <div id="page-type" class="page-type" style="display:none"></div>

    <!-- Champs editables du produit -->
    <div id="fields-container"></div>

    <!-- Marques (multi-select) -->
    <div id="brands-row" class="brands-row" style="display:none">
      <div class="field-label">Marques</div>
      <div class="brand-chips" id="brand-chips"></div>
    </div>

    <!-- Images -->
    <div id="images-container" class="images-row" style="display:none">
      <div class="field-label">Photos</div>
      <div class="images-grid" id="images-grid"></div>
    </div>

    <!-- Fournisseur -->
    <div id="supplier-section" style="display:none">
      <div class="section-title">Fournisseur</div>
      <div id="supplier-fields"></div>
      <div id="supplier-badges" class="badges"></div>
    </div>
  </div>

  <!-- Actions sticky en bas -->
  <div class="actions" id="actions-bar" style="display:none">
    <button class="btn secondary" id="btn-refresh">Reanalyser</button>
    <button class="btn primary" id="btn-import" disabled>Importer</button>
  </div>

  <!-- Success -->
  <div id="success-link" style="display:none; padding:12px; text-align:center;">
    <a class="link" id="result-link" href="#" target="_blank">Ouvrir la fiche</a>
  </div>

  <input type="hidden" id="backoffice-url" value="https://verone-backoffice.vercel.app" />

  <!-- Login form (affiché si pas connecté) -->
  <div id="login-card" class="login-card" style="display:none">
    <h2>Connexion Verone</h2>
    <p>Connecte-toi pour importer des produits dans le back-office.</p>
    <input type="email" id="login-email" placeholder="email@verone.fr" autocomplete="username" />

  <!-- Success modal (affiché après import réussi) -->
  <div id="success-modal" class="success-modal" style="display:none">
    <div class="icon">✓</div>

    <div class="subtitle" id="success-subtitle">Disponible dans le back-office Verone</div>

    <div class="actions-bottom">
      <button class="btn primary" id="success-open-bo">Ouvrir dans le back-office</button>
      <button class="btn secondary" id="success-new">Importer un autre produit</button>

  </div>

  <script src="popup.js"></script>
</body>
</html>
